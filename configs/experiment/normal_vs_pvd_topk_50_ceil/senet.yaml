# @package _global_

# SENet with TOP-K pooling for Normal vs PVD

defaults:
  - override /data: erdes
  - override /model: senet
  - override /callbacks: default
  - override /trainer: default
  - override /logger: tensorboard

tags: ["erdes", "senet", "topk_pooling"]

seed: 42

trainer:
  min_epochs: 0
  max_epochs: 50
  gradient_clip_val: 0.0

model:
  optimizer:
    lr: 1.5e-05
  scheduler: null
  compile: false
  net:
    pooling: topk
    topk_ratio: 0.5

data:
  batch_size: 48
  train_csv: "data/splits/normal_vs_pvd/train.csv"
  val_csv: "data/splits/normal_vs_pvd/val.csv"
  test_csv: "data/splits/normal_vs_pvd/test.csv"

logger:
  tensorboard:
    prefix: "senet"

callbacks:
  model_checkpoint:
    dirpath: ${paths.output_dir}/checkpoints/senet
    filename: "senet_best_epoch_{epoch:03d}"
    monitor: "val/acc"
    mode: "max"
    save_top_k: 1
    save_last: true
    auto_insert_metric_name: false
    verbose: true

  rich_progress_bar: null

hydra:
  run:
    dir: logs/train/runs/normal_vs_pvd_topk_50_ceil/senet/${now:%Y-%m-%d_%H-%M-%S}
