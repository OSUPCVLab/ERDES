# @package _global_

# UNETR with TOP-K pooling for Normal vs PVD

defaults:
  - override /data: erdes
  - override /model: unetr
  - override /callbacks: default
  - override /trainer: default
  - override /logger: tensorboard

tags: ["erdes", "unetr", "topk_pooling"]

seed: 42

trainer:
  min_epochs: 0
  max_epochs: 50
  gradient_clip_val: 0.0

model:
  optimizer:
    lr: 1.5e-05
  compile: false
  net:
    pooling: topk
    topk_ratio: 0.3

data:
  batch_size: 96
  train_csv: "data/splits/normal_vs_pvd/train.csv"
  val_csv: "data/splits/normal_vs_pvd/val.csv"
  test_csv: "data/splits/normal_vs_pvd/test.csv"

logger:
  tensorboard:
    prefix: "unetr"

callbacks:
  model_checkpoint:
    dirpath: ${paths.output_dir}/checkpoints/unetr
    filename: "unetr_best_epoch_{epoch:03d}"
    monitor: "val/acc"
    mode: "max"
    save_top_k: 1
    save_last: True
    auto_insert_metric_name: False
    verbose: True

  rich_progress_bar: null

hydra:
  run:
    dir: logs/train/runs/normal_vs_pvd_topk_30_ceil/unetr/${now:%Y-%m-%d_%H-%M-%S}
